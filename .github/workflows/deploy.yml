name: 🚀 Deploy to Vercel demo 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, tokenizer, xml, ctype, json, bcmath
          tools: composer:v2

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build Vite assets
        run: npm run build
        env:
          NODE_ENV: production

      # Deploy Production (เฉพาะ push ไป main)
      - name: 🚀 Deploy to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Preview Deploy (สำหรับ Pull Request)
      - name: 🔍 Deploy Preview (PR)
        if: github.event_name == 'pull_request'
        run: npx vercel --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}